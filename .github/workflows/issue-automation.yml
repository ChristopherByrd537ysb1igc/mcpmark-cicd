name: Issue Management Automation

on:
  issues:
    types: [opened, labeled]

jobs:
  issue-triage:
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run issue triage
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.issue;
            const title = context.payload.issue.title.toLowerCase();
            const body = context.payload.issue.body?.toLowerCase() || "";
            
            // Create required labels if they don't exist
            const labels = [
              // Category labels
              { name: "bug", color: "d73a4a", description: "Something isn't working" },
              { name: "enhancement", color: "a2eeef", description: "New feature or request" },
              { name: "epic", color: "0052cc", description: "Large feature requiring multiple sub-tasks" },
              { name: "maintenance", color: "fef2c0", description: "Maintenance and housekeeping tasks" },
              // Priority labels
              { name: "priority-critical", color: "b60205", description: "Critical priority issue" },
              { name: "priority-high", color: "d93f0b", description: "High priority issue" },
              { name: "priority-medium", color: "eaa636", description: "Medium priority issue" },
              { name: "priority-low", color: "0e8a16", description: "Low priority issue" },
              // Status labels
              { name: "needs-triage", color: "fbca04", description: "Needs to be reviewed by maintainers" },
              { name: "needs-review", color: "0075ca", description: "Awaiting review from maintainers" },
              { name: "first-time-contributor", color: "5319e7", description: "Issue created by first-time contributor" }
            ];
            
            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: issue.owner,
                  repo: issue.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description
                });
              } catch (err) {
                // Ignore if label already exists
                if (err.status !== 422) throw err;
              }
            }
            
            // Add initial needs-triage label
            await github.rest.issues.addLabels({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              labels: ["needs-triage"]
            });
            
            // Assign category label
            let categoryLabel = null;
            if (title.includes("bug")) {
              categoryLabel = "bug";
            } else if (title.includes("epic")) {
              categoryLabel = "epic";
            } else if (title.includes("maintenance")) {
              categoryLabel = "maintenance";
            }
            
            if (categoryLabel) {
              await github.rest.issues.addLabels({
                owner: issue.owner,
                repo: issue.repo,
                issue_number: issue.number,
                labels: [categoryLabel]
              });
            }
            
            // Assign priority label
            let priorityLabel = "priority-medium"; // Default
            
            const priorityKeywords = [
              { keywords: ["critical", "urgent", "production", "outage"], label: "priority-critical" },
              { keywords: ["important", "high", "blocking"], label: "priority-high" },
              { keywords: ["low", "nice-to-have", "minor"], label: "priority-low" }
            ];
            
            for (const p of priorityKeywords) {
              if (p.keywords.some(k => title.includes(k) || body.includes(k))) {
                priorityLabel = p.label;
                break;
              }
            }
            
            await github.rest.issues.addLabels({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              labels: [priorityLabel]
            });

  task-breakdown:
    runs-on: ubuntu-latest
    needs: issue-triage
    if: contains(github.event.issue.labels.*.name, 'epic')
    steps:
      - name: Create epic subtasks
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.issue;
            const parentTitle = context.payload.issue.title;
            const subtasks = [
              { name: "Requirements Analysis" },
              { name: "Design and Architecture" },
              { name: "Implementation" },
              { name: "Testing and Documentation" }
            ];
            
            const subtaskNumbers = [];
            
            // Create each subtask
            for (let i = 0; i < subtasks.length; i++) {
              const subtaskTitle = `[SUBTASK] ${parentTitle} - Task ${i+1}: ${subtasks[i].name}`;
              const subtaskBody = `Related to #${issue.number}`;
              
              const subtask = await github.rest.issues.create({
                owner: issue.owner,
                repo: issue.repo,
                title: subtaskTitle,
                body: subtaskBody,
                labels: ["enhancement", "needs-review"]
              });
              
              subtaskNumbers.push(subtask.data.number);
            }
            
            // Update parent issue with checklist
            const currentBody = context.payload.issue.body || "";
            const checklist = `## Epic Tasks\n${subtaskNumbers.map(num => `- [ ] #${num}`).join("\n")}`;
            const newBody = currentBody ? `${currentBody}\n\n${checklist}` : checklist;
            
            await github.rest.issues.update({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              body: newBody
            });

  auto-response:
    runs-on: ubuntu-latest
    needs: issue-triage
    steps:
      - name: Run auto-response
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.issue;
            const author = context.payload.issue.user.login;
            const labels = context.payload.issue.labels.map(l => l.name);
            
            // Check if this is the author's first issue in this repo
            const authorIssues = await github.rest.issues.listForRepo({
              owner: issue.owner,
              repo: issue.repo,
              creator: author,
              state: "all"
            });
            
            const isFirstIssue = authorIssues.data.length === 1;
            
            if (isFirstIssue) {
              await github.rest.issues.addLabels({
                owner: issue.owner,
                repo: issue.repo,
                issue_number: issue.number,
                labels: ["first-time-contributor"]
              });
            }
            
            // Determine response message
            let response = "";
            
            if (labels.includes("bug")) {
              response += "### Bug Report Guidelines\n";
              response += "Thank you for submitting a bug report! Please ensure you've provided all necessary details to help us reproduce and fix this issue.\n";
            } else if (labels.includes("epic")) {
              response += "### Feature Request Process\n";
              response += "Thank you for submitting an epic feature request! We'll review this and break it down into actionable subtasks shortly.\n";
            } else if (labels.includes("maintenance")) {
              response += "### Maintenance Guidelines\n";
              response += "Thank you for submitting a maintenance task! We'll review this and prioritize it accordingly.\n";
            }
            
            if (isFirstIssue) {
              response = `👋 Welcome to the repository, @${author}! This is your first issue here, thank you for contributing!\n\n${response}`;
            }
            
            // Post comment
            await github.rest.issues.createComment({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              body: response
            });
            
            // Set milestone for high/critical priority
            if (labels.includes("priority-high") || labels.includes("priority-critical")) {
              // Create milestone v1.0.0 if it doesn't exist
              try {
                await github.rest.issues.createMilestone({
                  owner: issue.owner,
                  repo: issue.repo,
                  title: "v1.0.0",
                  description: "Initial release milestone"
                });
              } catch (err) {
                // Ignore if milestone exists
                if (err.status !== 422) throw err;
              }
              
              await github.rest.issues.update({
                owner: issue.owner,
                repo: issue.repo,
                issue_number: issue.number,
                milestone: 1 // Assuming v1.0.0 is the first milestone
              });
            }
            
            // Remove needs-triage and add needs-review
            await github.rest.issues.removeLabel({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              name: "needs-triage"
            });
            
            await github.rest.issues.addLabels({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              labels: ["needs-review"]
            });